<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>404 - Page Not Found | Animated Error</title>
    <style>
        /* RESET & BASE STYLES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', system-ui, -apple-system, 'Inter', sans-serif;
            background: linear-gradient(145deg, #0b1120 0%, #111827 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* animated floating particles / stars background */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .star {
            position: absolute;
            background-color: rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            animation: floatStar linear infinite;
            box-shadow: 0 0 6px rgba(255, 255, 200, 0.6);
        }

        @keyframes floatStar {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }

            10% {
                opacity: 0.7;
            }

            90% {
                opacity: 0.5;
            }

            100% {
                transform: translateY(-20vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* main card container */
        .error-container {
            position: relative;
            z-index: 10;
            max-width: 720px;
            width: 100%;
            background: rgba(15, 25, 45, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.08);
            padding: 2rem 2rem 3rem;
            transition: transform 0.3s ease;
            text-align: center;
            border: 1px solid rgba(100, 150, 255, 0.3);
        }

        .error-container:hover {
            transform: scale(1.01);
            box-shadow: 0 30px 55px -12px rgba(0, 0, 0, 0.6);
            border-color: rgba(100, 180, 255, 0.5);
        }

        /* animated 404 digit area */
        .glitch-wrapper {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .glitch {
            font-size: clamp(5rem, 14vw, 9rem);
            font-weight: 800;
            font-family: 'Poppins', monospace;
            text-transform: uppercase;
            line-height: 1;
            color: #f0f3ff;
            letter-spacing: 0.1em;
            position: relative;
            text-shadow: 0.05em 0 0 rgba(255, 0, 100, 0.7), -0.05em -0.025em 0 rgba(0, 255, 255, 0.7);
            animation: glitchShake 0.45s infinite alternate ease-in-out;
        }

        @keyframes glitchShake {
            0% {
                text-shadow: 0.03em 0 0 rgba(255, 0, 100, 0.6), -0.03em -0.02em 0 rgba(0, 255, 255, 0.6);
                transform: skew(0deg);
            }

            25% {
                text-shadow: -0.03em 0.02em 0 rgba(255, 100, 0, 0.7), 0.04em -0.01em 0 rgba(0, 200, 255, 0.8);
                transform: skew(0.5deg);
            }

            50% {
                text-shadow: 0.05em -0.02em 0 #ff4d6d, -0.03em 0.04em 0 #4dfff0;
                transform: skew(-0.8deg);
            }

            100% {
                text-shadow: -0.04em 0.01em 0 #ff3366, 0.05em -0.03em 0 #33e0ff;
                transform: skew(0.3deg);
            }
        }

        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
        }

        .glitch::before {
            color: #ff4d6d;
            z-index: -1;
            animation: glitchBefore 0.38s infinite alternate;
        }

        .glitch::after {
            color: #4dfff0;
            z-index: -2;
            animation: glitchAfter 0.42s infinite alternate;
        }

        @keyframes glitchBefore {
            0% {
                clip-path: inset(0 0 0 0);
                transform: translate(-0.02em, -0.01em);
            }

            50% {
                clip-path: inset(20% 0 30% 0);
                transform: translate(0.02em, 0.01em);
            }

            100% {
                clip-path: inset(80% 0 5% 0);
                transform: translate(-0.01em, 0.02em);
            }
        }

        @keyframes glitchAfter {
            0% {
                clip-path: inset(70% 0 10% 0);
                transform: translate(0.02em, 0.01em);
            }

            60% {
                clip-path: inset(5% 0 60% 0);
                transform: translate(-0.02em, -0.01em);
            }

            100% {
                clip-path: inset(35% 0 45% 0);
                transform: translate(0.01em, 0.02em);
            }
        }

        /* title and message */
        .error-title {
            font-size: 1.8rem;
            font-weight: 600;
            background: linear-gradient(135deg, #ffffff, #aac8ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin: 1rem 0 0.5rem;
            letter-spacing: -0.3px;
        }

        .error-message {
            color: #cad2f0;
            font-weight: 400;
            font-size: 1.1rem;
            margin: 0.6rem 0 1.8rem;
            opacity: 0.9;
            max-width: 85%;
            margin-left: auto;
            margin-right: auto;
        }

        /* animated button group */
        .button-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.2rem;
            margin-top: 0.8rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            padding: 0.9rem 2rem;
            font-weight: 600;
            font-size: 1rem;
            font-family: inherit;
            border-radius: 60px;
            text-decoration: none;
            transition: all 0.25s ease;
            cursor: pointer;
            background: rgba(20, 30, 55, 0.7);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(90, 150, 255, 0.5);
            color: #eef5ff;
            letter-spacing: 0.3px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .btn-primary {
            background: linear-gradient(105deg, #2c3f6e, #1c2d4f);
            border-color: #4c7eff;
            color: white;
            box-shadow: 0 5px 15px -5px #1e3a8a40;
        }

        .btn-primary:hover {
            transform: translateY(-4px);
            background: linear-gradient(105deg, #3e5a8e, #24355e);
            border-color: #7fa2ff;
            box-shadow: 0 12px 20px -10px #0f172a;
        }

        .btn-outline {
            border-color: #5c7fcb;
            background: rgba(255, 255, 255, 0.02);
        }

        .btn-outline:hover {
            background: rgba(76, 126, 255, 0.15);
            transform: translateY(-3px);
            border-color: #9bbcff;
            backdrop-filter: blur(8px);
        }

        /* animated search suggestion bar with pulse */
        .search-section {
            margin-top: 2.5rem;
            padding-top: 1rem;
            border-top: 1px dashed rgba(100, 150, 255, 0.4);
        }

        .suggestion-text {
            font-size: 0.85rem;
            color: #a5b9e8;
            margin-bottom: 0.9rem;
            font-weight: 400;
        }

        .animated-input-group {
            display: flex;
            max-width: 400px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.35);
            border-radius: 80px;
            padding: 4px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(80, 140, 255, 0.5);
            transition: all 0.3s;
        }

        .animated-input-group:focus-within {
            border-color: #5f9eff;
            box-shadow: 0 0 12px rgba(79, 139, 255, 0.5);
            transform: scale(1.01);
        }

        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0.8rem 1.2rem;
            font-size: 0.95rem;
            color: #f0f5ff;
            font-family: inherit;
            outline: none;
        }

        .search-input::placeholder {
            color: #8aa2dd;
            font-weight: 300;
        }

        .search-btn {
            background: #2a3f70;
            border: none;
            border-radius: 40px;
            padding: 0.5rem 1.3rem;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            margin: 4px;
        }

        .search-btn:hover {
            background: #3c5a92;
            transform: scale(0.96);
        }

        /* floating orbs animation */
        .orb {
            position: fixed;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(80, 140, 255, 0.3), rgba(0, 30, 80, 0.1));
            filter: blur(45px);
            z-index: 0;
            pointer-events: none;
            animation: orbMove 12s infinite alternate ease-in-out;
        }

        @keyframes orbMove {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 0.4;
            }

            100% {
                transform: translate(30px, -40px) scale(1.2);
                opacity: 0.7;
            }
        }

        /* responsive fine-tuning */
        @media (max-width: 550px) {
            .error-container {
                padding: 1.6rem 1.2rem 2.2rem;
            }

            .btn {
                padding: 0.7rem 1.3rem;
                font-size: 0.85rem;
            }

            .error-message {
                font-size: 0.95rem;
            }

            .search-input {
                padding: 0.6rem 1rem;
            }
        }

        /* fun little floating 404 ghost effect */
        .floating-helper {
            font-size: 0.85rem;
            margin-top: 2rem;
            color: #6b86b3;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            flex-wrap: wrap;
            animation: fadeSlideUp 1s ease-out 0.2s backwards;
        }

        @keyframes fadeSlideUp {
            0% {
                opacity: 0;
                transform: translateY(15px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .cursor-blink {
            display: inline-block;
            width: 2px;
            height: 1.2rem;
            background-color: #7aa2f7;
            animation: blink 1s step-start infinite;
            margin-left: 2px;
            vertical-align: middle;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <!-- animated background particles (stars) -->
    <div class="stars" id="starsContainer"></div>

    <!-- floating ambient orbs -->
    <div class="orb" style="width: 280px; height: 280px; top: -80px; left: -100px;"></div>
    <div class="orb"
        style="width: 360px; height: 360px; bottom: -120px; right: -80px; background: radial-gradient(circle, rgba(120, 80, 255, 0.25), rgba(0, 0, 0, 0)); animation-duration: 18s;">
    </div>
    <div class="orb"
        style="width: 240px; height: 240px; bottom: 20%; left: 70%; background: radial-gradient(circle, rgba(0, 200, 210, 0.2), transparent); filter: blur(55px); animation-duration: 15s;">
    </div>

    <!-- main content -->
    <div class="error-container">
        <div class="glitch-wrapper">
            <div class="glitch" data-text="404">404</div>
        </div>
        <h1 class="error-title">Lost in the digital void?</h1>
        <p class="error-message">
            Oops! The page you're looking for doesn't exist, moved, or took a wrong turn.<br>
            Let's get you back on track.
        </p>
        <div class="button-group">
            <a href="/" class="btn btn-primary" id="homeBtn1">
                <span>🏠</span> Return Home
            </a>
            <a href="#" class="btn btn-outline" id="refreshBtn">
                <span>⟳</span> Try Again
            </a>
            <a href="/login" class="btn btn-outline" id="contactBtn2">
                <span>✉️</span> Login
            </a>
        </div>

        <!-- interactive search suggestion (fun + little demo) -->
        <div class="search-section">
            <div class="suggestion-text">
                🔍 Maybe you were looking for something? Try searching:
            </div>
            <div class="animated-input-group">
                <input type="text" class="search-input" id="searchBox" placeholder="e.g., homepage, blog, features...">
                <button class="search-btn" id="searchButton">Go</button>
            </div>
            <div class="floating-helper">
                <span>✨</span> Take a deep breath — even the best URLs get lost sometimes
                <span class="cursor-blink"></span>
            </div>
        </div>
    </div>

    <script>
        (function () {
            // ========== 1. ANIMATED BACKGROUND STARS GENERATION ==========
            function createStars() {
                const starsContainer = document.getElementById('starsContainer');
                if (!starsContainer) return;
                // Clear any existing stars
                starsContainer.innerHTML = '';
                const starCount = 120;
                for (let i = 0; i < starCount; i++) {
                    const star = document.createElement('div');
                    star.classList.add('star');
                    const size = Math.random() * 3 + 1.2; // 1.2px to 4.2px
                    star.style.width = size + 'px';
                    star.style.height = size + 'px';
                    star.style.left = Math.random() * 100 + '%';
                    // random animation duration and delay
                    const duration = Math.random() * 12 + 5; // 5-17s
                    const delay = Math.random() * 8;
                    star.style.animationDuration = duration + 's';
                    star.style.animationDelay = delay + 's';
                    star.style.opacity = Math.random() * 0.6 + 0.2;
                    starsContainer.appendChild(star);
                }
            }
            createStars();

            // ========== 2. interactive demo functions (for 404 demo feel) ==========
            const homeBtn = document.getElementById('homeBtn');
            const refreshBtn = document.getElementById('refreshBtn');
            const contactBtn = document.getElementById('contactBtn');
            const searchButton = document.getElementById('searchButton');
            const searchBox = document.getElementById('searchBox');

            // Helper: simple toast-like console log + alert replacement? we'll use temporary message inside floating-help area for fun (no intrusive alert)
            const floatingHelper = document.querySelector('.floating-helper');
            function showFloatingMessage(msg, isError = false) {
                if (floatingHelper) {
                    const originalHTML = floatingHelper.innerHTML;
                    const tempSpan = document.createElement('span');
                    tempSpan.style.background = isError ? 'rgba(180, 60, 60, 0.5)' : 'rgba(80, 150, 255, 0.5)';
                    tempSpan.style.padding = '4px 12px';
                    tempSpan.style.borderRadius = '60px';
                    tempSpan.style.fontSize = '0.8rem';
                    tempSpan.style.display = 'inline-flex';
                    tempSpan.style.alignItems = 'center';
                    tempSpan.style.gap = '6px';
                    tempSpan.innerText = msg;
                    floatingHelper.innerHTML = '';
                    floatingHelper.appendChild(tempSpan);
                    setTimeout(() => {
                        if (floatingHelper) floatingHelper.innerHTML = originalHTML;
                    }, 2200);
                } else {
                    console.log(msg);
                }
            }

            // Home button behaviour: pretend redirect to index (demo) but this is 404 page, we show custom simulation
            homeBtn.addEventListener('click', (e) => {
                e.preventDefault();
                showFloatingMessage("🏡 Taking you Home... (simulated redirect) ✨", false);
                setTimeout(() => {
                    // simulating page reload / redirect: just change container content overlay or do nothing? For UX demo we just animate
                    const container = document.querySelector('.error-container');
                    if (container) {
                        container.style.transform = 'scale(0.98)';
                        setTimeout(() => { container.style.transform = ''; }, 300);
                    }
                    showFloatingMessage("✨ Welcome back! Redirect to homepage demo complete.", false);
                }, 400);
            });

            // Try again button: reload simulation
            refreshBtn.addEventListener('click', (e) => {
                e.preventDefault();
                showFloatingMessage("🔄 Attempting to reload the page...", false);
                setTimeout(() => {
                    showFloatingMessage("✔️ No changes! You're still on 404, but refresh simulated.", false);
                    // visual blink effect
                    document.body.style.opacity = '0.98';
                    setTimeout(() => document.body.style.opacity = '1', 120);
                }, 500);
            });

            // Support button: fun message
            contactBtn.addEventListener('click', (e) => {
                e.preventDefault();
                showFloatingMessage("📞 Support team: The page might be gone, but we're here! contact@example.com", false);
            });

            // search functionality: pretend search on site (demo)
            function performSearch() {
                let query = searchBox.value.trim();
                if (query === "") {
                    showFloatingMessage("🔎 Please type something to search!", true);
                    searchBox.style.border = "1px solid #ff8888";
                    setTimeout(() => { searchBox.style.border = ""; }, 500);
                    return;
                }
                showFloatingMessage(`🔍 Searching for "${query}"... redirecting to search results (demo).`, false);
                // extra animation to input group
                const inputGroup = document.querySelector('.animated-input-group');
                if (inputGroup) {
                    inputGroup.style.transform = 'scale(1.02)';
                    setTimeout(() => { inputGroup.style.transform = ''; }, 200);
                }
                // optional clear feedback after 1.5 sec, but just a demo
                setTimeout(() => {
                    showFloatingMessage(`💡 No exact match for '${query}', but try our homepage!`, false);
                }, 800);
            }

            searchButton.addEventListener('click', (e) => {
                e.preventDefault();
                performSearch();
            });
            searchBox.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    performSearch();
                }
            });

            // Additional micro-interactions: glow on container card on mouse move (just fancy)
            const container = document.querySelector('.error-container');
            if (container) {
                container.addEventListener('mousemove', (e) => {
                    const rect = container.getBoundingClientRect();
                    const x = ((e.clientX - rect.left) / rect.width) * 100;
                    const y = ((e.clientY - rect.top) / rect.height) * 100;
                    container.style.setProperty('--x-pos', `${x}%`);
                    container.style.setProperty('--y-pos', `${y}%`);
                    // optional dynamic border light effect
                    container.style.borderImage = `radial-gradient(circle at ${x}% ${y}%, rgba(100,180,255,0.7), rgba(0,0,0,0.2)) 1`;
                    container.style.borderImageSlice = '1';
                });
                container.addEventListener('mouseleave', () => {
                    container.style.borderImage = '';
                    container.style.border = '1px solid rgba(100, 150, 255, 0.3)';
                });
            }

            // make glitch text dynamic: re-trigger shake intermittently? already infinite, but fine
            // Also: extra animated effect: change the glitch text random data attribute? not needed, just nice persistent.
            // create additional twinkling effect: set random stars reposition on window resize optional
            window.addEventListener('resize', () => {
                // regenerate stars positions? optional: we just re-calc but keep existing stars, only adjust if needed? Not necessary, but we can update positions lightly
                // but for performance, not necessary; just keep them responsive because stars have % left.
            });

            // add small easter egg: console message
            console.log("%c✨ 404 Page | Animated CSS Edition | lost? Navigating you back ✨", "color: #5f9eff; font-size: 14px; font-weight: bold;");

            // for the '404' glitch we also can add spark around if needed: adjust the glitch animation on hover additional
            const glitchEl = document.querySelector('.glitch');
            if (glitchEl) {
                glitchEl.addEventListener('mouseenter', () => {
                    glitchEl.style.animation = 'glitchShake 0.2s infinite alternate';
                });
                glitchEl.addEventListener('mouseleave', () => {
                    glitchEl.style.animation = 'glitchShake 0.45s infinite alternate ease-in-out';
                });
            }

            // Update random start movement: all stars already floating; perfect
            // also make sure floating orbs do their job:
            // Just a micro updater for dynamic feel: no extra needed
        })();
    </script>
</body>

</html>
